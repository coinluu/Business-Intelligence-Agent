name: Feature request
description: Propose an improvement to the Agent-managed intelligence workflow
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Describe the concrete workflow problem, not only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
