name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build clean source archive
        run: |
          git archive --format=zip --prefix=Business-Intelligence-Agent/ -o "business-intelligence-agent-${GITHUB_REF_NAME}.zip" HEAD
          shasum -a 256 "business-intelligence-agent-${GITHUB_REF_NAME}.zip" > "business-intelligence-agent-${GITHUB_REF_NAME}.zip.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            business-intelligence-agent-${{ github.ref_name }}.zip
            business-intelligence-agent-${{ github.ref_name }}.zip.sha256
